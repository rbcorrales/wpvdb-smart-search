name: Checks

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    uses: rbcorrales/wpvdb-scripts/.github/workflows/plugin-ci.yml@main
    with:
      bun-install: true
      bun-lint-command: bun run lint
      build-command: bun run build
