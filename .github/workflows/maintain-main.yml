name: Maintain main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  maintain:
    uses: rbcorrales/wpvdb-scripts/.github/workflows/plugin-maintain-main.yml@main
    with:
      composer-install: false
      bun-install: true
      version-bump: true
      plugin-file: wpvdb-smart-search.php
      version-constant: WPVDB_SMART_SEARCH_VERSION
      package-file: package.json
      pot-file: languages/wpvdb-smart-search.pot
      pot-project: WPVDB Smart Search
      i18n-command: bun run i18n
      commit-paths: |
        wpvdb-smart-search.php
        package.json
        languages/
